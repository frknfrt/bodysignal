server:
  port: ${PORT:8080}

spring:
  application:
    name: BodySignal

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

gemini:
  api:
    key: ${GEMINI_API_KEY}

groq:
  api:
    key: ${GROQ_API_KEY}